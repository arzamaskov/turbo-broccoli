name: runtracker-prod

services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: prod
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    env_file:
      - .env.prod
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      DATABASE_URL: "sqlite:///%kernel.project_dir%/var/data/app.db"
    volumes:
      - prod_sqlite_data:/app/var/data
      - prod_cache:/app/var/cache
      - prod_logs:/app/var/log
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 5

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    depends_on:
      php:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-8080}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  prod_sqlite_data:
  prod_cache:
  prod_logs:
