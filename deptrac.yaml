deptrac:
    paths:
        - ./src

    layers:
        - name: Domain
          collectors:
              - type: classLike
                value: App\\.+\\Domain\\..+

        - name: Application
          collectors:
              - type: classLike
                value: App\\.+\\Application\\..+

        - name: Infrastructure
          collectors:
              - type: classLike
                value: App\\.+\\Infrastructure\\..+

        - name: Presentation
          collectors:
              - type: classLike
                value: App\\.+\\Presentation\\..+

        - name: SymfonyUid
          collectors:
              - type: classLike
                value: Symfony\\Component\\Uid\\.+

        - name: Vendor
          collectors:
              - type: classLike
                value: ^Symfony\\(?!Component\\Uid\\).+
              - type: classLike
                value: ^Doctrine\\.+

    ruleset:
        Domain:
            - SymfonyUid

        Application:
            - Domain

        Infrastructure:
            - Domain
            - Application
            - Vendor
            - SymfonyUid

        Presentation:
            - Application
            - Vendor

        Vendor: ~

    ignore_uncovered_internal_classes: true
