name: runtracker

services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: dev
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    env_file:
      - .env
    environment:
      APP_ENV: dev
      APP_DEBUG: "1"
      DATABASE_URL: "sqlite:///%kernel.project_dir%/var/data/app.db"
      XDEBUG_MODE: "${XDEBUG_MODE:-off}"
      XDEBUG_CONFIG: "client_host=${XDEBUG_CLIENT_HOST:-host.docker.internal} client_port=${XDEBUG_CLIENT_PORT:-9003}"
    volumes:
      - ./:/app
      - composer_cache:/tmp/composer
      - sqlite_data:/app/var/data
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t >/dev/null 2>&1 && php bin/console about >/dev/null 2>&1 && test -w var/data/app.db"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      php:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./:/app:ro
      - ./docker/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  composer_cache:
  sqlite_data:
